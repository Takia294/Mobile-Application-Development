name: organ_and_blood_donation
description: "A new Flutter project"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # UI
  dropdown_search: ^5.0.6

  # Local Storage
  shared_preferences: ^2.2.3

  # File & Image
  image_picker: ^1.1.2
  file_picker: ^8.0.7
  path_provider: ^2.1.3

  # Google Map + Location
  google_maps_flutter: ^2.6.1
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Firebase Realtime Donor
  firebase_core: ^3.5.0
  cloud_firestore: ^5.4.4

  # Permission
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/screens/logo.png