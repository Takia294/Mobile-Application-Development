name: organ_and_blood_donation
description: "LifeLink - Organ & Blood Donation App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # =========================
  # UI & Dropdown
  # =========================
  dropdown_search: ^5.0.6

  # =========================
  # Local Storage
  # =========================
  shared_preferences: ^2.2.3

  # =========================
  # Image & File
  # =========================
  image_picker: ^1.1.2
  file_picker: ^8.0.7
  path_provider: ^2.1.3
  cached_network_image: ^3.4.1

  # =========================
  # Google Maps & Location
  # =========================
  google_maps_flutter: ^2.6.1
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # =========================
  # Firebase
  # =========================
  firebase_core: ^3.5.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  fl_chart: ^1.0.0

  # =========================
  # Permission
  # =========================
  permission_handler: ^11.3.1

  # =========================
  # State Management
  # =========================
  provider: ^6.1.2

  # =========================
  # Internet Check
  # =========================
  connectivity_plus: ^6.0.5

  # =========================
  # Loading Animation
  # =========================
  flutter_spinkit: ^5.2.1
  shimmer: ^3.0.0

  # =========================
  # Date Formatting
  # =========================
  intl: ^0.19.0

  # =========================
  # URL Launcher
  # =========================
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/screens/logo.png