name: lifelink
description: "LifeLink — Blood & Organ Donation Network"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4

  # ── Free map (OpenStreetMap) — no API key required ──
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # ── Location ──
  geolocator: ^13.0.1
  firebase_messaging: ^15.1.3   # push notifications
  google_sign_in: ^6.2.1        # Google login
  sign_in_with_apple: ^6.1.3    # Apple login
  crypto: ^3.0.5   

  # ── UI helpers ──
  dropdown_search: ^5.0.6
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
